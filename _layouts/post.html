---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d de %B, %Y" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a class="post-back" href="{{ "/blog/" | relative_url }}">&larr; Volver al blog</a>
</article>
